name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install dotnet-script
        # Integration tests run the generated .csx dispatcher via `dotnet script` as a real
        # subprocess (Integration/EmitterRunnerTests); unlike `dotnet fsi`, it isn't bundled
        # with the SDK.
        run: dotnet tool install --global dotnet-script

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"
