openapi: 3.0.3
info:
  title: Swagger Petstore
  description: A sample API that uses a petstore as an example to demonstrate api2skill.
  version: 1.0.0
servers:
- url: https://petstore.example.com/v2
tags:
- name: pet
  description: Everything about your Pets
- name: store
  description: Access to Petstore orders
paths:
  /pet/findByStatus:
    get:
      tags:
      - pet
      operationId: findPetsByStatus
      summary: Finds Pets by status
      description: Multiple status values can be provided with comma separated strings.
      security:
      - petstore_auth:
        - read:pets
      parameters:
      - name: status
        in: query
        required: true
        description: Status values that need to be considered for filter
        schema:
          type: string
          enum:
          - available
          - pending
          - sold
          default: available
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid status value
  /pet/{petId}:
    get:
      tags:
      - pet
      operationId: getPetById
      summary: Find pet by ID
      description: Returns a single pet.
      security:
      - api_key: []
      parameters:
      - name: petId
        in: path
        required: true
        description: ID of pet to return
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found
  /pet:
    post:
      tags:
      - pet
      operationId: addPet
      summary: Add a new pet to the store
      security:
      - petstore_auth:
        - write:pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetInput'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /store/inventory:
    get:
      tags:
      - store
      summary: Returns pet inventories by status
      security:
      - api_key: []
      responses:
        '200':
          description: successful operation
  /health:
    get:
      summary: Health check (no tag, no auth)
      responses:
        '200':
          description: ok
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Category id
        name:
          type: string
          description: Category name
    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Tag id
        name:
          type: string
          description: Tag name
    PetInput:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Pet name
        status:
          type: string
          description: Pet status in the store
          enum:
          - available
          - pending
          - sold
        category:
          $ref: '#/components/schemas/Category'
        tags:
          type: array
          description: Tags attached to this pet
          items:
            $ref: '#/components/schemas/Tag'
    Pet:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: integer
          format: int64
          description: Pet id
        name:
          type: string
          description: Pet name
        status:
          type: string
          description: Pet status in the store
          enum:
          - available
          - pending
          - sold
        category:
          $ref: '#/components/schemas/Category'
        tags:
          type: array
          description: Tags attached to this pet
          items:
            $ref: '#/components/schemas/Tag'
  securitySchemes:
    api_key:
      type: apiKey
      name: api_key
      in: header
    petstore_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://petstore.example.com/oauth/token
          scopes:
            write:pets: modify pets in your account
            read:pets: read your pets
